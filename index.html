<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kombat Analyst</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>
    <h1>Kombat Analyst</h1>
    <p id="fighter-count">Loading fighters...</p>
</header>

<input
    type="text"
    id="search-input"
    placeholder="Search fighters..."
>
<div class="comparison-section">

    <h2>Compare Fighters</h2>

    <select id="fighter-a">
        <option value="">Select Fighter A</option>
    </select>

    <select id="fighter-b">
        <option value="">Select Fighter B</option>
    </select>

    <button id="compare-btn">
        Compare
    </button>

</div>

<div id="comparison-results"></div>

<div id="fighters-container"></div>

    <script src="app.js"></script>

</body>
</html>
